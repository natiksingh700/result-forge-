<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Result Forge</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .brand-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: #f97316;
            margin-bottom: 0.5rem;
        }
        .brand-title span { color: #38bdf8; }
        h2 {
            text-align: center;
            font-size: 1.3rem;
            color: #cbd5e1;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 0.4rem;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #475569;
            border-radius: 8px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #f97316; }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(249,115,22,0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-top: 1rem;
            font-weight: 600;
            display: none;
        }
        .message.success { display: block; background: #065f46; color: #6ee7b7; border: 1px solid #059669; }
        .message.error { display: block; background: #7f1d1d; color: #fca5a5; border: 1px solid #dc2626; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
        .lock-icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .password-rules {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="lock-icon">🔐</div>
        <div class="brand-title">Result<span>Forge</span></div>
        <h2>Set New Password</h2>
        
        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password" required minlength="4">
                <p class="password-rules">Must be at least 4 characters</p>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your new password" required minlength="4">
            </div>
            <button type="submit" class="btn-primary" id="resetBtn">🔑 Change Password</button>
        </form>

        <div id="messageBox" class="message"></div>
        
        <a href="/" class="back-link">← Go to Login Page</a>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const messageBox = document.getElementById('messageBox');
        const resetBtn = document.getElementById('resetBtn');

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            messageBox.textContent = '❌ Invalid link! No token found. Please request password reset again.';
            messageBox.className = 'message error';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                messageBox.textContent = '❌ Passwords do not match!';
                messageBox.className = 'message error';
                return;
            }

            if (newPassword.length < 4) {
                messageBox.textContent = '❌ Password must be at least 4 characters long!';
                messageBox.className = 'message error';
                return;
            }

            resetBtn.textContent = 'Processing...';
            resetBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                
                const data = await res.json();

                if (res.ok) {
                    messageBox.textContent = '✅ ' + data.message;
                    messageBox.className = 'message success';
                    form.style.display = 'none';
                    
                    // 3 second baad login page pe redirect
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    messageBox.textContent = '❌ ' + (data.error || 'Something went wrong');
                    messageBox.className = 'message error';
                }
            } catch (err) {
                messageBox.textContent = '❌ Failed to connect to server';
                messageBox.className = 'message error';
            } finally {
                resetBtn.textContent = '🔑 Change Password';
                resetBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
